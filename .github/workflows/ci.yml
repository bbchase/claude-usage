name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Lint
        run: |
          pip install ruff
          ruff check .
      - name: Shellcheck
        run: shellcheck install.sh bin/claude-usage
